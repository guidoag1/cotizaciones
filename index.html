<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🚀 APP COTIZACIONES + CATÁLOGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 GENERADOR DE COTIZACIONES</h1>
        
        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('cotizacion')">📋 Cotización</button>
            <button class="tab-btn" onclick="showTab('catalogo')">📦 Catálogo</button>
        </div>

        <!-- TAB COTIZACIÓN -->
        <div id="cotizacion" class="tab-content active">
            <!-- DATOS CLIENTE -->
            <div class="section">
                <h2>👤 Cliente</h2>
                <input type="text" id="cliente" placeholder="Nombre cliente">
                <input type="text" id="email" placeholder="Email">
                <input type="date" id="fecha">
                <input type="text" id="numeroCot" placeholder="N° Cotización">
            </div>

            <!-- ÍTEMS -->
            <div class="section">
                <h2>📦 Ítems <button id="addItemBtn" class="btn-small">➕ Manual</button> <button id="addFromCatalogo" class="btn-small">📋 Desde Catálogo</button></h2>
                <div id="items">
                    <div class="item-row">
                        <input type="text" class="desc" placeholder="Descripción">
                        <input type="number" class="cant" placeholder="Cant" min="1">
                        <input type="number" class="precio" placeholder="$ Precio" step="0.01">
                        <span class="total">$0</span>
                        <button class="delete">🗑️</button>
                    </div>
                </div>
            </div>

            <!-- TOTALES -->
            <div class="totals">
                <div>Subtotal: $<span id="subtotal">$0</span></div>
                <div>IVA 16%: $<span id="iva">$0</span></div>
                <div>Descuento: $<span id="descuento">$0</span></div>
                <hr>
                <div class="grand-total">TOTAL: $<span id="total">$0</span></div>
            </div>

            <!-- BOTONES -->
            <div class="buttons">
                <button id="generarPDF">📄 Generar PDF</button>
                <button id="limpiar">🗑️ Limpiar Todo</button>
                <button id="guardarCatalogo">💾 Guardar en Catálogo</button>
            </div>
        </div>

        <!-- TAB CATÁLOGO -->
        <div id="catalogo" class="tab-content">
            <div class="section">
                <h2>📦 Catálogo de Artículos</h2>
                <div class="catalogo-controls">
                    <input type="text" id="buscarArticulo" placeholder="🔍 Buscar artículo...">
                    <button id="nuevoArticulo" class="btn-small">➕ Nuevo</button>
                </div>
                
                <div id="listaArticulos" class="articulos-grid"></div>
            </div>

            <!-- FORM NUEVO ARTÍCULO -->
            <div id="formNuevoArticulo" class="modal hidden">
                <div class="modal-content">
                    <h3>➕ Nuevo Artículo</h3>
                    <input type="text" id="nuevoDesc" placeholder="Descripción">
                    <input type="number" id="nuevoPrecio" placeholder="Precio unitario" step="0.01">
                    <input type="text" id="nuevoCodigo" placeholder="Código (opcional)">
                    <div class="modal-buttons">
                        <button id="guardarArticulo">💾 Guardar</button>
                        <button id="cancelarArticulo">❌ Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
